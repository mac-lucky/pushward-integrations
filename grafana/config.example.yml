# pushward-grafana configuration
# Runs as a sidecar next to Grafana, receives alert webhooks,
# queries Prometheus/VictoriaMetrics for metric history,
# and pushes timeline sparklines to PushWard Live Activities.

# Optional: Shared secret for authenticating Grafana webhook requests.
# Can also be set via PUSHWARD_WEBHOOK_TOKEN env var.
# Configure the matching token in your Grafana contact point under
# Authorization: Bearer <token>.
# webhook_token: ""

server:
  address: ":8090"

# PushWard API connection
pushward:
  url: "https://api.pushward.app"
  api_key: "hlk_..."
  priority: 5
  cleanup_delay: 15m
  stale_timeout: 24h

# Prometheus or VictoriaMetrics — queried directly for metric history
metrics:
  url: "http://prometheus:9090"
  # Optional auth (uncomment if your Prometheus/VM requires it):
  # username: ""
  # password: ""
  # bearer_token: ""

# Optional: Grafana API for auto-extracting PromQL from alert rules.
# Requires an Editor-role service account token.
# When configured, no per-rule annotations are needed.
# grafana:
#   url: "http://grafana:3000"
#   api_token: "glsa_..."
#   alert_check_interval: 5m  # Poll Grafana to detect resolved alerts when webhooks are missed

# Timeline sparkline defaults
timeline:
  history_window: 30m    # How far back to query on alert fire
  poll_interval: 30s     # How often to poll for fresh data points
  smoothing: true        # Curve smoothing on sparkline
  scale: "linear"        # "linear" or "logarithmic"
  decimals: 1            # Value precision
  severity_label: "severity"
  default_severity: "warning"

# --- Per-rule configuration via Grafana alert rule annotations ---
#
# Instead of configuring rules here, add annotations to your
# Grafana alert rules:
#
#   pushward_query:     The PromQL expression for history backfill
#   pushward_unit:      Unit label (e.g., "%", "°C", "ms")
#   pushward_threshold: Threshold value shown as dashed line
#   pushward_ref_id:    Which values{} key to use (default: first)
#
# If grafana.url + grafana.api_token are set, the query is
# auto-extracted from the alert rule — no annotations needed.

# --- Widgets ---
#
# Each entry below polls a PromQL/MetricsQL query and publishes the value
# to the pushward-server widget API so users see it live on their iOS
# Home Screen / Lock Screen widget. Widgets are auto-created on startup
# (idempotent), and only PATCHed when the value changes (unless
# update_mode: always is set).
#
# Requirements:
#   - The PushWard API key above (pushward.api_key) must be an
#     integration key (hlk_...) with the `widgets` scope enabled.
#     Without it the server returns 403 on first widget create.
#   - Per-user widget cap on the server is 50.
#
# widgets:
#   # Scalar example: number of registered users.
