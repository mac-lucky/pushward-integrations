name: CI/CD ArgoCD

on:
  push:
    branches: [main]
    tags: ['v*']
    paths: ['argocd/**', 'shared/**', '.github/workflows/argocd-ci-cd.yml']
  pull_request:
    branches: [main]
    paths: ['argocd/**', 'shared/**', '.github/workflows/argocd-ci-cd.yml']
  workflow_dispatch:

jobs:
  ci-cd:
    uses: mac-lucky/actions-shared-workflows/.github/workflows/go-cicd-reusable.yml@master
    permissions:
      contents: read
      packages: write
      security-events: write
    with:
      app_name: "pushward-argocd"
      ghcr_image: "ghcr.io/mac-lucky/pushward-argocd"
      dockerhub_image: "maclucky/pushward-argocd"
      push_to_dockerhub: false
      push_on_main: true
      main_branch: "main"
      build_context: "."
      dockerfile_path: "./argocd/Dockerfile"
      go_module_path: "./argocd"
      enable_go_tests: true
      go_test_args: "-race -count=1 -v"
      enable_container_tests: false
      enable_kubernetes_tests: false
    secrets: inherit
