name: golangci-lint

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - '**/*.go'
      - 'go.work'
      - '**/go.mod'
      - '**/go.sum'
      - '.golangci.yml'

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache-dependency-path: '**/go.sum'
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: --timeout=10m
          only-new-issues: ${{ github.event_name == 'pull_request' }}
