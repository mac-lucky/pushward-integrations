name: golangci-lint

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - '**/*.go'
      - 'go.work'
      - '**/go.mod'
      - '**/go.sum'
      - '.golangci.yml'

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    uses: mac-lucky/actions-shared-workflows/.github/workflows/golangci-lint-reusable.yml@master
    with:
      golangci_lint_version: v2.11.4
