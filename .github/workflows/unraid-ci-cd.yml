name: CI/CD Unraid

on:
  push:
    branches: [main]
    tags: ['unraid-v*']
    paths: ['unraid/**', 'shared/**', '.github/workflows/unraid-ci-cd.yml']
  pull_request:
    branches: [main]
    paths: ['unraid/**', 'shared/**', '.github/workflows/unraid-ci-cd.yml']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: unraid/go.mod
          cache-dependency-path: unraid/go.sum

      - name: Build (linux/amd64 static)
        working-directory: unraid
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: go build -trimpath -ldflags="-s -w" -o pushward-unraid ./cmd/pushward-unraid

      - name: Test
        working-directory: unraid
        run: go test -race -count=1 -v ./...

  release-binary:
    if: startsWith(github.ref, 'refs/tags/unraid-v')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: unraid/go.mod
          cache-dependency-path: unraid/go.sum

      - name: Derive version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#unraid-v}" >> "$GITHUB_OUTPUT"

      - name: Build static binary
        working-directory: unraid
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: go build -trimpath -ldflags="-s -w" -o pushward-unraid ./cmd/pushward-unraid

      - name: Package
        working-directory: unraid
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          ARCHIVE="pushward-unraid_${VERSION}_linux_x86_64.tar.gz"
          tar -czf "$ARCHIVE" pushward-unraid
          sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256"
          ls -l "$ARCHIVE" "${ARCHIVE}.sha256"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: unraid
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          gh release create "${GITHUB_REF_NAME}" \
            --title "pushward-unraid ${VERSION}" \
            --notes "Linux x86_64 binary for the Unraid plugin (mac-lucky/pushward-unraid-plugin)." \
            "pushward-unraid_${VERSION}_linux_x86_64.tar.gz" \
            "pushward-unraid_${VERSION}_linux_x86_64.tar.gz.sha256"
