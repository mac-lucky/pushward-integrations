server:
  address: ":8090"

sabnzbd:
  url: ""               # or set PUSHWARD_SABNZBD_URL — http:// is fine for trusted internal networks
  # SECURITY NOTE: SABnzbd's API only accepts the key as a URL query parameter
  # (no header auth in SABnzbd 4.5+). Over plain http://, intermediate proxies
  # or routers may capture the key from access logs. The integration redacts
  # the key from its own logs. For exposure outside trusted networks, front
  # SABnzbd with HTTPS.
  api_key: ""           # or set PUSHWARD_SABNZBD_API_KEY
  webhook_secret: ""    # or set PUSHWARD_SABNZBD_WEBHOOK_SECRET
  template: "generic"   # or set PUSHWARD_SABNZBD_TEMPLATE ("generic" or "timeline")
  timeline:             # only used when template is "timeline"
    smoothing: true     # smooth sparkline curve interpolation
    scale: "linear"     # "linear" or "logarithmic"
    decimals: 0         # 0-10, controls value label precision

pushward:
  url: ""               # or set PUSHWARD_URL (e.g. https://api.pushward.app)
  api_key: ""           # or set PUSHWARD_API_KEY (hlk_ integration key)
  priority: 1
  cleanup_delay: 15m    # ended_ttl: how long the finished activity lingers before the server deletes it
  stale_timeout: 30m    # stale_ttl: server auto-ends the activity if no update arrives in this window
  end_delay: 5s         # two-phase end: wait before the final ONGOING frame
  end_display_time: 4s  # two-phase end: how long that frame shows before ENDED

polling:
  interval: 5s          # or set PUSHWARD_POLL_INTERVAL
