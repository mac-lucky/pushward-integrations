server:
  address: ":8090"

argocd:
  webhook_secret: ""    # optional: match X-Webhook-Secret header from argocd-notifications
  url: ""               # ArgoCD UI base URL (e.g. https://argocd.example.com) — populates "View" button on Live Activity

pushward:
  url: "http://pushward-server:8080"
  api_key: ""           # or set PUSHWARD_API_KEY env var
  priority: 3           # lower than alerts (5), since deploys are routine
  cleanup_delay: 5m
  stale_timeout: 30m    # syncs shouldn't take this long

# --- argocd-notifications configuration ---
#
# Add to argocd-notifications-cm ConfigMap:
#
# Webhook service:
#   service.webhook.pushward: |
#     url: http://pushward-argocd.pushward:8090
#     headers:
#       - name: Content-Type
#         value: application/json
#       - name: X-Webhook-Secret
#         value: $webhook-secret    # optional, from argocd-notifications-secret
#
# Templates (one per trigger, hardcoding the event field):
#   template.pushward-sync-running: |
#     webhook:
#       pushward:
#         method: POST
#         path: /webhook
#         body: |
#           {
#             "app": "{{.app.metadata.name}}",
#             "project": "{{.app.spec.project}}",
#             "event": "sync-running",
#             "sync_status": "{{.app.status.sync.status}}",
#             "health_status": "{{.app.status.health.status}}",
#             "operation_phase": "{{.app.status.operationState.phase}}",
#             "revision": "{{.app.status.operationState.syncResult.revision}}",
#             "message": "{{.app.status.operationState.message}}"
#           }
#
#   template.pushward-sync-succeeded: |
#     webhook:
#       pushward:
#         method: POST
#         path: /webhook
#         body: |
#           {
#             "app": "{{.app.metadata.name}}",
#             "project": "{{.app.spec.project}}",
#             "event": "sync-succeeded",
#             "sync_status": "{{.app.status.sync.status}}",
#             "health_status": "{{.app.status.health.status}}",
#             "operation_phase": "{{.app.status.operationState.phase}}",
#             "revision": "{{.app.status.operationState.syncResult.revision}}",
#             "message": "{{.app.status.operationState.message}}"
#           }
#
#   template.pushward-sync-failed: |
#     webhook:
#       pushward:
#         method: POST
#         path: /webhook
#         body: |
#           {
#             "app": "{{.app.metadata.name}}",
#             "project": "{{.app.spec.project}}",
#             "event": "sync-failed",
#             "sync_status": "{{.app.status.sync.status}}",
#             "health_status": "{{.app.status.health.status}}",
#             "operation_phase": "{{.app.status.operationState.phase}}",
#             "revision": "{{.app.status.operationState.syncResult.revision}}",
#             "message": "{{.app.status.operationState.message}}"
#           }
#
#   template.pushward-deployed: |
#     webhook:
#       pushward:
#         method: POST
#         path: /webhook
#         body: |
#           {
#             "app": "{{.app.metadata.name}}",
#             "project": "{{.app.spec.project}}",
#             "event": "deployed",
#             "sync_status": "{{.app.status.sync.status}}",
#             "health_status": "{{.app.status.health.status}}",
#             "revision": "{{.app.status.sync.revision}}",
#             "message": "Application is healthy and synced"
#           }
#
#   template.pushward-health-degraded: |
#     webhook:
#       pushward:
#         method: POST
#         path: /webhook
#         body: |
#           {
#             "app": "{{.app.metadata.name}}",
#             "project": "{{.app.spec.project}}",
#             "event": "health-degraded",
#             "sync_status": "{{.app.status.sync.status}}",
#             "health_status": "{{.app.status.health.status}}",
#             "revision": "{{.app.status.sync.revision}}",
#             "message": "{{.app.status.health.message}}"
#           }
#
# Triggers:
#   trigger.on-pushward-sync-running: |
#     - when: app.status.operationState.phase in ['Running']
#       oncePer: app.status.operationState.syncResult.revision
#       send: [pushward-sync-running]
#
#   trigger.on-pushward-sync-succeeded: |
#     - when: app.status.operationState.phase in ['Succeeded']
#       oncePer: app.status.operationState.syncResult.revision
#       send: [pushward-sync-succeeded]
#
#   trigger.on-pushward-sync-failed: |
#     - when: app.status.operationState.phase in ['Error', 'Failed']
#       oncePer: app.status.operationState.syncResult.revision
#       send: [pushward-sync-failed]
#
#   trigger.on-pushward-deployed: |
#     - when: app.status.health.status == 'Healthy' and app.status.sync.status == 'Synced'
#       oncePer: app.status.sync.revision
#       send: [pushward-deployed]
#
#   trigger.on-pushward-health-degraded: |
#     - when: app.status.health.status == 'Degraded'
#       oncePer: app.status.sync.revision
#       send: [pushward-health-degraded]
#
# Subscribe per-app (annotations on Application):
#   notifications.argoproj.io/subscribe.on-pushward-sync-running.pushward: ""
#   notifications.argoproj.io/subscribe.on-pushward-sync-succeeded.pushward: ""
#   notifications.argoproj.io/subscribe.on-pushward-sync-failed.pushward: ""
#   notifications.argoproj.io/subscribe.on-pushward-deployed.pushward: ""
#   notifications.argoproj.io/subscribe.on-pushward-health-degraded.pushward: ""
#
# Or subscribe globally in argocd-notifications-cm:
#   defaultTriggers: |
#     - on-pushward-sync-running
#     - on-pushward-sync-succeeded
#     - on-pushward-sync-failed
#     - on-pushward-deployed
#     - on-pushward-health-degraded
