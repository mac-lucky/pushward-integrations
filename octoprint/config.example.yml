server:
  address: ":8090"

octoprint:
  url: ""               # or set PUSHWARD_OCTOPRINT_URL (e.g. http://192.168.1.50:5000)
  api_key: ""           # or set PUSHWARD_OCTOPRINT_API_KEY
  webhook_secret: ""    # or set PUSHWARD_OCTOPRINT_WEBHOOK_SECRET

pushward:
  url: ""               # or set PUSHWARD_URL (e.g. https://api.pushward.app)
  api_key: ""           # or set PUSHWARD_API_KEY (hlk_ integration key)
  priority: 1
  cleanup_delay: 15m
  stale_timeout: 30m

polling:
  interval: 5s          # or set PUSHWARD_POLL_INTERVAL
