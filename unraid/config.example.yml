unraid:
  host: "unraid.example.com"  # Unraid WebSocket host (set PUSHWARD_UNRAID_HOST)
  port: 80                    # nginx proxies /graphql on 80 (HTTP) or 443 (HTTPS); set PUSHWARD_UNRAID_PORT
  api_key: ""                 # Unraid API key (set PUSHWARD_UNRAID_API_KEY)
  server_name: "Unraid"       # Display name for subtitles
  use_tls: false              # Use wss:// instead of ws://

pushward:
  url: ""                     # PushWard server URL (set PUSHWARD_URL)
  api_key: ""                 # Integration key with activity:manage scope (set PUSHWARD_API_KEY)
  priority: 2
  cleanup_delay: 15m
  stale_timeout: 24h
  end_delay: 5s
  end_display_time: 4s
